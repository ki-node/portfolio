name: Quality gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Static, unit, browser and performance checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static checks, unit tests and production build
        run: npm run check

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Check for visual regression baselines
        id: visual-baselines
        shell: bash
        run: |
          if compgen -G 'tests/e2e/portfolio.visual.spec.ts-snapshots/*.png' > /dev/null; then
            echo 'missing=false' >> "$GITHUB_OUTPUT"
          else
            echo 'missing=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Generate initial visual regression baselines
        if: steps.visual-baselines.outputs.missing == 'true'
        run: npx playwright test tests/e2e/portfolio.visual.spec.ts --update-snapshots

      - name: Upload initial visual regression baselines
        if: always() && steps.visual-baselines.outputs.missing == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: visual-regression-baselines
          path: tests/e2e/portfolio.visual.spec.ts-snapshots
          if-no-files-found: error
          retention-days: 7

      - name: Run mobile and desktop browser tests
        run: npm run test:e2e:ci

      - name: Enforce Lighthouse budgets
        run: npm run lighthouse
