name: Quality gate

on:
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Static, unit, browser and performance checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static checks, unit tests and production build
        run: npm run check

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Run mobile and desktop browser tests
        run: npm run test:e2e:ci

      - name: Enforce Lighthouse budgets
        run: npm run lighthouse
