version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    groups:
      development-tooling:
        dependency-type: development
        update-types: [minor, patch]
    # TypeScript 7 is outside the supported range of the current
    # typescript-eslint toolchain. Remove this once support lands.
    ignore:
      - dependency-name: typescript
        versions: ['>=7.0.0']

  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
